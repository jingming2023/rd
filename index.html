<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语桥 ReadBridge — 协作双语阅读平台</title>
<!-- Supabase SDK：主CDN + 国内备用 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  if(typeof supabase==='undefined'){
    document.write('<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"><\/script>');
  }
</script>
<style>
:root{--bg:#faf7f2;--pbg:#fffdf9;--t:#3b3028;--s:#8b7355;--a:#8b5e3c;--a2:#c4956a;--bd:#e5dbcd;--sh:0 1px 6px rgba(0,0,0,0.04);--hl:#fff8e7;--ca:#dcfce7;--cd:#fee2e2;--bbg:#dbeafe;--bbb:#93c5fd;--bbt:#2563eb}
body.dark{--bg:#1a1a2e;--pbg:#16213e;--t:#d4d4d4;--s:#9a9a9a;--a:#e2b96f;--a2:#f0d89c;--bd:#2a2a4a;--sh:0 1px 6px rgba(0,0,0,0.2);--hl:#3a3520;--ca:#14532d;--cd:#7f1d1d;--bbg:#1e3a5f;--bbb:#3b82f6;--bbt:#93c5fd}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Georgia','Noto Serif SC',serif;background:var(--bg);color:var(--t);min-height:100vh;transition:background 0.3s,color 0.3s}
a{color:var(--a);text-decoration:none;cursor:pointer}a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer}

/* 顶部 */
.topbar{background:var(--pbg);border-bottom:1px solid var(--bd);padding:8px 18px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.topbar .logo{font-size:1.15em;font-weight:700;color:var(--a);cursor:pointer}
.nav{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.btn{padding:6px 14px;border:1.5px solid var(--bd);border-radius:16px;background:var(--pbg);font-size:0.82em;color:var(--t);transition:all 0.2s;display:inline-flex;align-items:center;gap:4px}
.btn:hover{border-color:var(--a2);background:var(--hl)}
.btn.a{background:var(--a);color:#fff;border-color:var(--a)}.btn.a:hover{opacity:0.85}
.btn.sm{padding:4px 9px;font-size:0.72em;border-radius:12px}

/* 资料库 */
.lib-page{padding:28px 20px;max-width:1100px;margin:0 auto}
.lib-page h1{font-size:1.5em;color:var(--a);margin-bottom:4px}
.lib-page .sub{font-size:0.85em;color:var(--s);margin-bottom:18px}
.lib-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.lib-tags span{padding:4px 13px;border-radius:14px;border:1.5px solid var(--bd);cursor:pointer;font-size:0.8em;transition:all 0.2s;background:var(--pbg);color:var(--s)}
.lib-tags span.on,.lib-tags span:hover{background:var(--a);color:#fff;border-color:var(--a)}
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.book-card{background:var(--pbg);border:1.5px solid var(--bd);border-radius:14px;padding:20px;cursor:pointer;transition:all 0.2s;box-shadow:var(--sh)}
.book-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,0.08);border-color:var(--a2)}
.book-card .cover{font-size:2.6em;text-align:center;margin-bottom:8px}
.book-card .title{font-weight:700;margin-bottom:2px}
.book-card .author{font-size:0.76em;color:var(--s);margin-bottom:6px}
.book-card .genre{display:inline-block;padding:2px 8px;border-radius:6px;font-size:0.73em;background:var(--hl);color:var(--a)}
.book-card .meta{font-size:0.7em;color:var(--s);margin-top:8px;display:flex;gap:10px;align-items:center}
.book-card .meta .has-contrib{background:var(--bbg);color:var(--bbt);font-weight:600;padding:1px 7px;border-radius:8px;font-size:0.95em}

/* 阅读器 */
.reader-page{display:none;height:calc(100vh - 50px);flex-direction:column}
.reader-page.on{display:flex}
.reader-top{display:flex;align-items:center;gap:12px;padding:7px 16px;border-bottom:1px solid var(--bd);flex-shrink:0;font-size:0.82em;background:var(--pbg)}
.reader-body{flex:1;display:flex;overflow:hidden}
.reader-panel{flex:1;overflow-y:auto;padding:16px 14px}
.reader-panel.l{background:var(--pbg);border-right:1px solid var(--bd)}
.reader-panel.r{background:var(--bg)}
.ph{font-size:0.68em;text-transform:uppercase;letter-spacing:2px;color:var(--s);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--a2);position:sticky;top:0;background:inherit;z-index:2;display:flex;justify-content:space-between}

/* 段落 */
.para{margin-bottom:12px;padding:10px 12px;border-radius:8px;border-left:3px solid transparent;line-height:1.85;font-size:var(--fs,1.02em);transition:all 0.2s;position:relative}
.para:hover{background:var(--hl);border-left-color:var(--a2)}
.para .n{font-size:0.58em;color:var(--s);display:block;margin-bottom:3px}
.para .ptool{position:absolute;top:6px;right:8px;display:none;gap:5px;align-items:center;font-size:0.62em}
.para:hover .ptool{display:flex}
.para .ptool .vbadge{padding:2px 7px;border-radius:8px;background:var(--bbg);color:var(--bbt);border:1px solid var(--bbb);cursor:pointer;font-weight:600;white-space:nowrap}
.para .ptool button{padding:2px 7px;border-radius:8px;border:1px solid var(--bd);background:var(--pbg);color:var(--s);cursor:pointer;font-size:0.9em}
.para .ptool button:hover{border-color:var(--a);color:var(--a)}
.just-done{animation:fadeUp 0.4s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 评论区 */
.comments-section{margin-top:6px;padding-left:8px;border-left:2px solid var(--bd)}
.comment-item{padding:4px 6px;margin:3px 0;font-size:0.78em;display:flex;gap:6px;align-items:flex-start}
.comment-item .c-author{font-weight:600;color:var(--a);white-space:nowrap;font-size:0.85em}
.comment-item .c-text{color:var(--t);line-height:1.4}
.comment-input-row{display:flex;gap:6px;margin-top:4px}
.comment-input-row input{flex:1;padding:4px 8px;border:1.5px solid var(--bd);border-radius:10px;font-size:0.75em;background:var(--pbg);color:var(--t);font-family:inherit}
.comment-input-row input:focus{outline:none;border-color:var(--a)}
.comment-input-row button{font-size:0.7em;padding:3px 8px;border-radius:10px;border:1px solid var(--a);background:var(--a);color:#fff;cursor:pointer}

/* 阅读报告 */
.report{background:var(--pbg);border:1.5px solid var(--a2);border-radius:14px;padding:20px 24px;margin:16px}
.report h3{color:var(--a);margin-bottom:10px}
.report-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px}
.report-item{text-align:center;padding:8px;border-radius:8px;background:var(--hl)}
.report-item .num{font-size:1.3em;font-weight:700;color:var(--a)}
.report-item .lbl{font-size:0.68em;color:var(--s);margin-top:2px}

/* 弹窗 */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal.on{opacity:1;pointer-events:auto}
.modal .box{background:var(--pbg);border-radius:14px;padding:24px;width:520px;max-width:92vw;max-height:78vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,0.2)}
.modal .box h3{color:var(--a);margin-bottom:4px}
.modal .mo{font-size:0.8em;color:var(--s);margin-bottom:12px}
.modal .box input,.modal .box textarea{width:100%;padding:9px 12px;border:2px solid var(--bd);border-radius:10px;background:var(--pbg);color:var(--t);font-family:inherit;font-size:0.92em;margin-bottom:6px}
.modal .box textarea{min-height:100px;resize:vertical;line-height:1.6}
.modal .box input:focus,.modal .box textarea:focus{outline:none;border-color:var(--a)}
.modal .acts{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.modal label{display:block;font-size:0.8em;color:var(--s);margin-bottom:3px;font-weight:600}
.form-hint{font-size:0.72em;color:var(--s);margin-bottom:8px}

/* 版本历史 */
.vlist{list-style:none;margin:10px 0}
.vlist li{padding:10px 12px;border-radius:8px;margin-bottom:6px;border:1px solid var(--bd);cursor:pointer}
.vlist li:hover{background:var(--hl)}
.vlist li.cur{border-color:var(--a);border-width:2px;background:var(--hl)}
.vlist li .vh{display:flex;justify-content:space-between;margin-bottom:2px;font-size:0.82em}
.vlist li .vt{font-size:0.85em;line-height:1.5;margin-top:4px}
.diff-view{font-size:0.85em;line-height:1.8;margin:8px 0;padding:10px 12px;border-radius:8px;background:var(--bg)}
.diff-add{background:var(--ca);padding:1px 3px;border-radius:2px}
.diff-del{background:var(--cd);text-decoration:line-through;padding:1px 3px;border-radius:2px}

@media(max-width:768px){
  .book-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
  .reader-body{flex-direction:column}
  .reader-panel{flex:none;height:50%;padding:10px 8px}
  .reader-panel.l{border-right:none;border-bottom:3px solid var(--a2)}
  .btn{padding:4px 9px;font-size:0.7em}
  .topbar{padding:6px 8px;gap:3px}
  .modal .box{width:96vw;padding:14px}
}
</style>
</head>
<body>

<!-- 顶部 -->
<header class="topbar">
  <span class="logo" onclick="goLib()">📖 语桥 ReadBridge</span>
  <div class="nav" id="nav"></div>
</header>

<!-- 资料库 -->
<div class="lib-page" id="libPage">
  <h1>📚 协作翻译资料库</h1>
  <div class="sub">AI初译 + 社区精修。每一段翻译都是一个开源协作项目。</div>
  <div class="lib-tags">
    <span class="on" onclick="filter('all',this)">全部</span>
    <span onclick="filter('名著',this)">📖 名著</span>
    <span onclick="filter('网文',this)">📱 网文</span>
  </div>
  <div class="book-grid" id="bookGrid"></div>
</div>

<!-- 阅读器 -->
<div class="reader-page" id="readerPage">
  <div class="reader-top">
    <span class="back" onclick="goLib()">← 资料库</span>
    <span style="color:var(--s)" id="rbTitle"></span>
    <span style="flex:1"></span>
    <div style="display:flex;border:1.5px solid var(--bd);border-radius:16px;overflow:hidden">
      <button class="on" onclick="setL('en',this)" style="padding:5px 9px;border:none;background:var(--a);color:#fff;font-size:0.76em;border-right:1px solid var(--bd)">🇬🇧</button>
      <button onclick="setL('ja',this)" style="padding:5px 9px;border:none;background:var(--pbg);font-size:0.76em;color:var(--s);border-right:1px solid var(--bd)">🇯🇵</button>
      <button onclick="setL('ko',this)" style="padding:5px 9px;border:none;background:var(--pbg);font-size:0.76em;color:var(--s);border-right:1px solid var(--bd)">🇰🇷</button>
      <button onclick="setL('fr',this)" style="padding:5px 9px;border:none;background:var(--pbg);font-size:0.76em;color:var(--s)">🇫🇷</button>
    </div>
    <button class="btn sm" onclick="speakAll()">🔊朗读</button>
    <button class="btn sm" onclick="document.body.classList.toggle('dark')">🌓</button>
  </div>
  <div class="reader-body" id="readerBody">
    <div class="reader-panel l" id="leftP">
      <div class="ph">📝 原文 <span id="wc" style="font-weight:normal;font-size:0.85em"></span></div>
      <div id="leftC"></div>
      <div class="report" id="report" style="display:none"></div>
    </div>
    <div class="reader-panel r" id="rightP">
      <div class="ph">🌐 译文 <span id="tlLbl" style="font-weight:normal;font-size:0.85em">English</span></div>
      <div id="rightC"><div style="text-align:center;padding:60px;color:var(--s)">打开一本书，开始双语阅读</div></div>
    </div>
  </div>
</div>

<!-- 登录弹窗 -->
<div class="modal" id="authModal"><div class="box">
  <h3 id="authTitle">👤 登录</h3><div class="mo" id="authSub">登录以同步翻译贡献</div>
  <input type="email" id="authEmail" placeholder="邮箱">
  <input type="password" id="authPass" placeholder="密码（至少6位）">
  <input type="text" id="authName" placeholder="用户名（注册时需要）">
  <div class="form-hint" style="margin-bottom:8px;background:var(--hl);padding:8px;border-radius:8px;font-size:0.75em;">
    💡 <strong>演示账号（可直接登录）：</strong><br>
    alice / bob / carol / david / emma / frank @demo.com<br>
    密码统一：<strong>demo1234</strong>
  </div>
  <div class="acts">
    <button class="btn" id="authToggle" onclick="toggleAuth()">没有账号？去注册</button>
    <button class="btn a" id="authBtn" onclick="doAuth()">登录</button>
  </div>
</div></div>

<!-- 编辑弹窗 -->
<div class="modal" id="edM"><div class="box">
  <h3>✏️ 改进翻译</h3><div class="mo">段落 <span id="edI"></span> · 当前：<strong id="edA"></strong></div>
  <label>📝 原文</label><div style="padding:10px;background:var(--bg);border-radius:8px;font-size:0.9em;line-height:1.7;margin-bottom:8px" id="edO"></div>
  <label>🌐 我的翻译</label><textarea id="edT" placeholder="输入更好的翻译..."></textarea>
  <div class="acts"><button class="btn" onclick="closeEd()">取消</button><button class="btn a" onclick="doEd()">✅ 提交 v<span id="edV">2</span></button></div>
</div></div>

<!-- 版本弹窗 -->
<div class="modal" id="vrM"><div class="box">
  <h3>📜 版本历史</h3><div class="mo" id="vrT"></div>
  <div id="vrDiff" style="display:none"><div style="font-size:0.72em;font-weight:600;margin-bottom:4px">🔄 差异：</div><div class="diff-view" id="vrDiffC"></div></div>
  <ul class="vlist" id="vrL"></ul>
  <div class="acts"><button class="btn" onclick="closeVr()">关闭</button></div>
</div></div>

// ============================================================
const PRELOAD = {

    title:'小王子',author:'圣-埃克苏佩里',genre:'名著',cover:'🌟',desc:'全球销量仅次于圣经的童话，被翻译成300多种语言。',wordCount:3150,
    zh:[
      '当我还只有六岁的时候，在一本描写原始森林的名叫《真实的故事》的书中，看到了一幅精彩的插画，画的是一条蟒蛇正在吞食一头野兽。书中写道："蟒蛇会把猎物整个吞进去，完全不咀嚼。然后它们就无法动弹了，要花六个月的时间边睡觉边消化。"',
      '当时，我对丛林中的奇遇思考了很多。于是，我也用彩色铅笔，画出了我的第一幅画。我的作品一号。我把我的杰作拿给大人们看，问他们我的画是不是让他们害怕。他们却回答："一顶帽子有什么好怕的？"',
      '我画的不是一顶帽子。我画的是一条蟒蛇正在消化一头大象。于是我又把蟒蛇肚子里的情况画了出来，好让大人们能够看懂。这些大人啊，总是需要解释。我的作品二号画完后，大人们劝我把这些开着肚皮或闭着肚皮的蟒蛇画丢在一边。',
      '大人们劝我还是把心思放在地理、历史、算术和语法上。就这样，在六岁那年，我放弃了当画家这一美好的职业。我的作品一号和作品二号没获得成功，这让我泄了气。这些大人们，靠他们自己什么也弄不懂，总是需要不断地给他们解释，这真叫孩子们厌烦。',
      '所以后来，我只好选择了另外一个职业——我学会了开飞机，差不多飞遍了整个世界。的确，地理学帮了我的大忙。我一眼就能分辨出中国和亚利桑那。要是夜里迷失了航向，这是很有用的。我在大人们中间生活过很长时间，仔细地观察过他们，但这并没有使我对他们的看法有多大的改变。',

    ],
    en:[
      "Once when I was six years old I saw a magnificent picture in a book about the primeval forest, called True Stories. It showed a boa constrictor swallowing a wild beast. In the book it said: \"Boa constrictors swallow their prey whole, without chewing. After that they are not able to move, and they sleep through the six months that they need for digestion.\"",

      "My drawing was not a picture of a hat. It was a picture of a boa constrictor digesting an elephant. So I drew the inside of the boa constrictor to help the grown-ups understand. They always need explanations. After Drawing Number Two, the grown-ups advised me to put aside my drawings of boa constrictors.",
      "The grown-ups advised me to devote myself instead to geography, history, arithmetic and grammar. That is why, at the age of six, I gave up what might have been a magnificent career as a painter. I had been disheartened by the failure of my drawings. Grown-ups never understand anything by themselves, and it is exhausting for children to be always explaining things to them.",

    ja:[

let authMode='login';
function renderNav(){
  const n=document.getElementById('nav');
  if(session){
    n.innerHTML='<span style="font-size:0.82em">👤 <strong>'+escapeHtml(profile?.username||session.user.email)+'</strong></span> '
      +'<button class="btn sm" id="logoutBtn">退出</button> '
      +'<button class="btn sm" id="themeBtn1">🌓</button>';
    document.getElementById('logoutBtn').onclick=doLogout;
    document.getElementById('themeBtn1').onclick=toggleTheme;
  }else{
    n.innerHTML='<button class="btn a sm" id="loginBtn">👤 登录</button> '
      +'<button class="btn sm" id="regBtn">📝 注册</button> '
      +'<button class="btn sm" id="themeBtn2">🌓</button>';
    document.getElementById('loginBtn').onclick=function(){openAuth('login');};
    document.getElementById('regBtn').onclick=function(){openAuth('register');};
    document.getElementById('themeBtn2').onclick=toggleTheme;
  }
}
function openAuth(mode){
  authMode=mode;
  document.getElementById('authTitle').textContent=mode==='login'?'👤 登录':'📝 注册';
  document.getElementById('authSub').textContent=mode==='login'?'登录以同步翻译贡献':'注册成为语桥社区成员';
  document.getElementById('authBtn').textContent=mode==='login'?'登录':'注册';
  document.getElementById('authToggle').textContent=mode==='login'?'没有账号？去注册':'已有账号？去登录';
  document.getElementById('authName').style.display=mode==='login'?'none':'block';
  document.getElementById('authModal').classList.add('on');
}
function toggleAuth(){closeAuth();openAuth(authMode==='login'?'register':'login');}
function closeAuth(){document.getElementById('authModal').classList.remove('on');}
async function doAuth(){
  if(!requireDB()) return;
  const email=document.getElementById('authEmail').value.trim();
  const pass=document.getElementById('authPass').value;
  const name=document.getElementById('authName').value.trim();
  if(!email||!pass){alert('请填写邮箱和密码');return;}
  if(pass.length<6){alert('密码至少6位');return;}
  let r;
  if(authMode==='login'){
    r=await db.auth.signInWithPassword({email,password:pass});
  }else{
    if(!name){alert('请填写用户名');return;}
    r=await db.auth.signUp({email,password:pass,options:{data:{username:name}}});
    if(!r.error){
      // 手动插入profile（触发器已被移除）
      await db.from('profiles').insert({id:r.data.user.id,username:name});
    }
  }
  if(r.error){
    if(r.error.message.includes('rate limit')||r.error.message.includes('exceeded')){
      alert('注册暂时受限（演示环境频率限制）。\n\n请直接使用演示账号登录：\nalice@demo.com / bob@demo.com / carol@demo.com\n密码：demo1234');
    }else{
      alert('操作失败：'+r.error.message);
    }
    return;
  }
  session=r.data.session;
  await loadProfile();
  closeAuth();
  renderNav();
  renderLib();
}
async function doLogout(){if(db)await db.auth.signOut();session=null;profile=null;renderNav();renderLib();}
async function loadProfile(){
  if(!session||!db)return;
  const{data}=await db.from('profiles').select('*').eq('id',session.user.id).single();
  profile=data;
}

let filterTag='all';
function renderLib(){
  let books=Object.entries(PRELOAD).map(([id,b])=>({id,...b}));
  if(filterTag!=='all') books=books.filter(b=>b.genre===filterTag);
  document.getElementById('bookGrid').innerHTML=books.map(b=>{
    return'<div class="book-card" onclick="openB(\''+b.id+'\')">'
      +'<div class="cover">'+b.cover+'</div>'
      +'<div class="title">'+b.title+'</div>'
      +'<div class="author">'+b.author+'</div>'
      +'<span class="genre">'+b.genre+'</span>'
      +'<div class="meta"><span>📄 '+b.wordCount+'字</span></div>'
      +'</div>';
  }).join('');
}
function filter(g,el){filterTag=g;document.querySelectorAll('.lib-tags span').forEach(t=>t.classList.remove('on'));el.classList.add('on');renderLib();}
function goLib(){
  curBook=null;
  document.getElementById('libPage').style.display='block';
  document.getElementById('readerPage').classList.remove('on');
}

let curBook=null,curLang='en',editIdx=null,commVersions={},commComments={},realtimeChannel=null;

async function openB(id){
  curBook=PRELOAD[id];if(!curBook)return;
  curBook.id=id;
  document.getElementById('libPage').style.display='none';
  document.getElementById('readerPage').classList.add('on');
  document.getElementById('rbTitle').textContent=curBook.title+' · '+curBook.author;
  document.getElementById('tlLbl').textContent={en:'English',ja:'日本語',ko:'한국어',fr:'Français'}[curLang]||'English';

  // 加载云端翻译版本
  commVersions={};commComments={};
  await loadCloudVersions();
  await loadComments();
  subscribeRealtime();

  renderL();renderR();updateWC();syncScroll();
}

async function loadCloudVersions(){
  if(!db)return;
  try{const{data}=await db.from('translations').select('*').eq('book_id',curBook.id).eq('language',curLang).order('version',{ascending:true});
  if(data){data.forEach(v=>{const k=v.paragraph_index+'-'+curLang;if(!commVersions[k])commVersions[k]=[];commVersions[k].push(v);});}}catch(e){console.warn('Load versions failed');}
}
async function loadComments(){
  if(!db)return;
  try{const{data}=await db.from('comments').select('*').eq('book_id',curBook.id).order('created_at',{ascending:true});
  if(data){data.forEach(c=>{const k=c.paragraph_index;if(!commComments[k])commComments[k]=[];commComments[k].push(c);});}}catch(e){console.warn('Load comments failed');}
}

function subscribeRealtime(){
  if(!db)return;
  if(realtimeChannel)db.removeChannel(realtimeChannel);
  realtimeChannel=db.channel('rb-'+curBook.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'translations',filter:'book_id=eq.'+curBook.id},async()=>{
      await loadCloudVersions();renderR();showReport();
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'comments',filter:'book_id=eq.'+curBook.id},async()=>{
      await loadComments();renderR();
    })
    .subscribe();
}

function getActive(pi,lang){
  const k=pi+'-'+lang;
  const cloud=commVersions[k];
  if(cloud&&cloud.length>0) return cloud[cloud.length-1]; // 最新版本
  const pre=curBook[lang];
  if(pre&&pre[pi]) return {version:1,author_name:'AI',content:pre[pi]};
  return null;
}

function getVersions(pi,lang){
  const k=pi+'-'+lang;
  return commVersions[k]||[];
}

function renderL(){
  const c=document.getElementById('leftC');
  const zh=curBook.zh;if(!zh)return;
  c.innerHTML=zh.map((t,i)=>'<div class="para" data-i="'+i+'"><span class="n">§ '+(i+1)+'</span>'+escapeHtml(t)+'</div>').join('');
}

function renderR(){
  const c=document.getElementById('rightC');
  const zh=curBook.zh;if(!zh)return;
  c.innerHTML=zh.map((_,i)=>{
    const v=getActive(i,curLang);const has=v&&v.content;
    const vs=getVersions(i,curLang);
    const comments=commComments[i]||[];
    return'<div class="para'+(has?' just-done':'')+'" data-i="'+i+'">'
      +'<div class="ptool">'
      +(vs.length>1?'<span class="vbadge" onclick="openVr('+i+')">v'+vs.length+' · '+vs.length+'版本</span>'
        :(has?'<span class="vbadge" onclick="openVr('+i+')">v1 · AI</span>':''))
      +(session?'<button onclick="openEd('+i+')">✏️</button>':'')
      +'<button onclick="openComment('+i+')">💬</button></div>'
      +'<span class="n">§ '+(i+1)+(v&&v.author_name!=='AI'?' · 👤 '+v.author_name:'')+'</span>'
      +escapeHtml(has?v.content:'加载中...')
      +(has?' <button class="btn sm" style="margin-top:4px" onclick="speak('+i+')">🔊</button>':'')
      +(comments.length>0?'<div class="comments-section">'+comments.map(c=>'<div class="comment-item"><span class="c-author">'+escapeHtml(c.author_name)+'</span><span class="c-text">'+escapeHtml(c.content)+'</span></div>').join('')+'</div>':'')
      +'<div class="comment-input-row" id="commentRow'+i+'" style="display:none"><input id="commentInput'+i+'" placeholder="写评论..."><button onclick="doComment('+i+')">发送</button></div>'
      +'</div>';
  }).join('');
  showReport();updateWC();
}

function showReport(){
  const zh=curBook.zh;if(!zh)return;
  let edits=0,contribs=new Set();
  for(let i=0;i<zh.length;i++){
    const vs=getVersions(i,curLang);
    vs.forEach(v=>{if(v.author_name!=='AI'){edits++;contribs.add(v.author_name);}});
  }
  const editedParas=zh.filter((_,i)=>(commVersions[i+'-'+curLang]||[]).some(v=>v.author_name!=='AI')).length;
  document.getElementById('report').style.display='block';
  document.getElementById('report').innerHTML='<h3>📊 阅读报告</h3><div class="report-grid">'
    +'<div class="report-item"><div class="num">'+zh.length+'</div><div class="lbl">📖 段落</div></div>'
    +'<div class="report-item"><div class="num">'+zh.reduce((s,t)=>s+t.length,0)+'</div><div class="lbl">📝 总字数</div></div>'
    +'<div class="report-item"><div class="num">'+editedParas+'</div><div class="lbl">✏️ 被改进</div></div>'
    +'<div class="report-item"><div class="num">'+contribs.size+'</div><div class="lbl">👥 贡献者</div></div>'
    +'<div class="report-item"><div class="num">'+(commComments?Object.values(commComments).flat().length:0)+'</div><div class="lbl">💬 评论</div></div>'
    +'</div>';
}

function updateWC(){
  const zh=curBook.zh;if(!zh)return;
  document.getElementById('wc').textContent=' · '+zh.length+'段 · '+zh.reduce((s,t)=>s+t.length,0)+'字';
}

function syncScroll(){
  const L=document.getElementById('leftP'),R=document.getElementById('rightP');let s=false;
  function sync(a,b){if(s)return;s=true;const r=a.scrollTop/(a.scrollHeight-a.clientHeight||1);b.scrollTop=r*(b.scrollHeight-b.clientHeight||1);requestAnimationFrame(()=>{s=false;});}
  L.onscroll=()=>sync(L,R);R.onscroll=()=>sync(R,L);
}

function setL(l,el){
  curLang=l;
  document.querySelectorAll('.reader-top button[onclick^="setL"]').forEach(b=>{b.style.background='var(--pbg)';b.style.color='var(--s)';});
  el.style.background='var(--a)';el.style.color='#fff';
  document.getElementById('tlLbl').textContent={en:'English',ja:'日本語',ko:'한국어',fr:'Français'}[l]||'English';
  loadCloudVersions().then(()=>{renderR();showReport();});
}

// ============================================================
// 6. 编辑翻译
// ============================================================
function openEd(i){
  if(!session){alert('请先登录');return;}
  editIdx=i;
  const v=getActive(i,curLang);
  document.getElementById('edI').textContent=i+1;
  document.getElementById('edA').textContent=v?v.author_name:'AI';
  document.getElementById('edO').textContent=curBook.zh[i];
  document.getElementById('edT').value=v?v.content:'';
  const vs=getVersions(i,curLang);
  document.getElementById('edV').textContent=vs.length+1;
  document.getElementById('edM').classList.add('on');
}
function closeEd(){document.getElementById('edM').classList.remove('on');editIdx=null;}
async function doEd(){
  if(editIdx===null)return;
  if(!requireDB())return;
  const t=document.getElementById('edT').value.trim();if(!t){alert('请输入翻译');return;}
  const vs=getVersions(editIdx,curLang);
  const authorName=profile?.username||session.user.email;
  const{error}=await db.from('translations').insert({
    book_id:curBook.id,paragraph_index:editIdx,language:curLang,
    version:vs.length+1,author_id:session.user.id,author_name:authorName,content:t
  });
  if(error){alert('保存失败：'+error.message);return;}
  // 更新贡献计数
  await db.from('profiles').update({contributions:(profile?.contributions||0)+1}).eq('id',session.user.id);
  await loadCloudVersions();
  closeEd();renderR();showReport();
}

// ============================================================
// 7. 评论
// ============================================================
function openComment(i){
  if(!session){alert('请先登录');return;}
  const row=document.getElementById('commentRow'+i);
  row.style.display=row.style.display==='none'?'flex':'none';
  if(row.style.display!=='none') document.getElementById('commentInput'+i).focus();
}
async function doComment(i){
  if(!requireDB())return;
  const input=document.getElementById('commentInput'+i);
  const t=input.value.trim();if(!t)return;
  const authorName=profile?.username||session.user.email;
  const{error}=await db.from('comments').insert({
    book_id:curBook.id,paragraph_index:i,author_id:session.user.id,author_name:authorName,content:t
  });
  if(error){alert('评论失败：'+error.message);return;}
  input.value='';
  await loadComments();
  renderR();
}

// ============================================================
// 8. 版本历史
// ============================================================
function openVr(i){
  const vs=getVersions(i,curLang);
  let displayVs=vs;
  if(displayVs.length===0){
    const pre=curBook[curLang];
    if(pre&&pre[i]) displayVs=[{version:1,author_name:'AI',content:pre[i]}];
  }
  document.getElementById('vrT').textContent='段落'+(i+1)+' · '+displayVs.length+'个版本';
  document.getElementById('vrL').innerHTML=displayVs.map(v=>{
    return'<li onclick="setActiveV('+i+','+v.version+')"><div class="vh"><strong>'+escapeHtml(v.author_name)+'</strong><span>v'+v.version+'</span></div><div class="vt">'+escapeHtml(v.content.substring(0,400))+'</div></li>';
  }).join('');
  if(displayVs.length>=2){
    document.getElementById('vrDiff').style.display='block';
    document.getElementById('vrDiffC').innerHTML=simpleDiff(displayVs[displayVs.length-2].content,displayVs[displayVs.length-1].content);
  }else{document.getElementById('vrDiff').style.display='none';}
  document.getElementById('vrM').classList.add('on');
}
function closeVr(){document.getElementById('vrM').classList.remove('on');}
async function setActiveV(pi,vn){
  // 对于demo，版本切换仅做显示用途
  await loadCloudVersions();
  closeVr();renderR();showReport();
}

function simpleDiff(o,n){
  const ow=o.split(/(\s+|[,.!?;:'"()-])/),nw=n.split(/(\s+|[,.!?;:'"()-])/);
  let r='',oi=0,ni=0;
  while(oi<ow.length||ni<nw.length){
    if(oi>=ow.length){r+='<span class="diff-add">'+escapeHtml(nw[ni]||'')+'</span>';ni++}
    else if(ni>=nw.length){r+='<span class="diff-del">'+escapeHtml(ow[oi]||'')+'</span>';oi++}
    else if(ow[oi]===nw[ni]){r+=escapeHtml(ow[oi]);oi++;ni++}
    else{let found=false;
      for(let l=1;l<6&&ni+l<nw.length;l++){if(ow[oi]===nw[ni+l]){for(let k=0;k<l;k++)r+='<span class="diff-add">'+escapeHtml(nw[ni+k]||'')+'</span>';ni+=l;found=true;break}}
      if(!found){r+='<span class="diff-del">'+escapeHtml(ow[oi]||'')+'</span>';oi++;if(ni<nw.length&&ow[oi]!==nw[ni]){r+='<span class="diff-add">'+escapeHtml(nw[ni]||'')+'</span>';ni++}}
    }
  }
  return r||'（无变化）';
}

// ============================================================
// 9. 朗读
// ============================================================
function speak(i){const v=getActive(i,curLang);if(!v?.content)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(v.content);u.lang={en:'en-US',ja:'ja-JP',ko:'ko-KR',fr:'fr-FR'}[curLang]||'en-US';window.speechSynthesis.speak(u);}
function speakAll(){const zh=curBook.zh;if(!zh)return;const all=zh.map((_,i)=>getActive(i,curLang)?.content||'').join(' ');if(!all.trim())return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(all);u.lang={en:'en-US',ja:'ja-JP',ko:'ko-KR',fr:'fr-FR'}[curLang]||'en-US';window.speechSynthesis.speak(u);}
function toggleTheme(){document.body.classList.toggle('dark');}

// ============================================================
// 10. 工具
// ============================================================
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ============================================================
// 11. 启动
// ============================================================
document.addEventListener('DOMContentLoaded',async()=>{
  document.documentElement.style.setProperty('--fs','17px');
  // 恢复session
  if(db){
    try{const{data}=await db.auth.getSession();if(data.session){session=data.session;await loadProfile();}}catch(e){console.warn('Session restore failed');}
  }
  renderNav();renderLib();
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeEd();closeVr();closeAuth();}});
});
</script>
